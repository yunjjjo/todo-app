<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Todo List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f6fb; min-height: 100vh; }

    .app { display: flex; gap: 24px; max-width: 1100px; margin: 40px auto; padding: 0 24px; align-items: flex-start; }

    .calendar { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.08); flex: 1; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-header button { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #4f6ef7; padding: 4px 10px; border-radius: 8px; }
    .cal-header button:hover { background: #f0f3ff; }
    .cal-header h2 { font-size: 1.2rem; color: #1a1a2e; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-label { text-align: center; font-size: 0.8rem; font-weight: 600; color: #888; padding: 6px 0; }
    .cal-day-label:first-child { color: #e53935; }
    .cal-day-label:last-child { color: #1565c0; }

    .cal-day {
      min-height: 100px; border-radius: 10px; padding: 8px;
      cursor: pointer; transition: background .15s;
      background: #fafafa; border: 2px solid transparent;
    }
    .cal-day:hover { background: #e8eeff; }
    .cal-day.today { border-color: #4f6ef7; background: #f0f3ff; }
    .cal-day.selected { background: #e8eeff; border-color: #4f6ef7; }
    .cal-day.empty { background: none; cursor: default; border: none; }
    .cal-day.empty:hover { background: none; }

    .day-num { font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; color: #333; }
    .cal-day.today .day-num { color: #4f6ef7; }

    .cal-todo-item { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
    .cal-todo-item input[type="checkbox"] { width: 13px; height: 13px; cursor: pointer; accent-color: #4f6ef7; flex-shrink: 0; }
    .cal-todo-label { font-size: 0.72rem; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .cal-todo-item.done .cal-todo-label { text-decoration: line-through; color: #bbb; }

    .side-panel {
      width: 0; overflow: hidden; transition: width .3s ease;
      background: white; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    .side-panel.open { width: 300px; }
    .side-inner { width: 300px; padding: 24px; }
    .side-panel h3 { font-size: 1rem; color: #1a1a2e; margin-bottom: 16px; }

    .todo-item-side { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .todo-item-side.done .side-title { text-decoration: line-through; color: #aaa; }
    .side-title { flex: 1; font-size: 0.9rem; }
    .side-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: #4f6ef7; }
    .btn-sm { padding: 4px 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }
    .btn-sm.del { background: #fdecea; color: #c62828; }
    .btn-sm.edit { background: #fff8e1; color: #f57f17; }

    .side-input-area { margin-top: 16px; }
    .side-input-area input { width: 100%; padding: 10px; border: 1px solid #dde3f0; border-radius: 8px; font-size: 0.9rem; outline: none; margin-bottom: 8px; }
    .side-input-area input:focus { border-color: #4f6ef7; }
    .btn-full { width: 100%; padding: 10px; background: #4f6ef7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
    .btn-full:hover { background: #3a55d4; }

    .edit-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 20; justify-content: center; align-items: center; }
    .edit-modal-bg.show { display: flex; }
    .edit-modal { background: white; border-radius: 16px; padding: 24px; width: 340px; box-shadow: 0 4px 24px rgba(0,0,0,.15); }
    .edit-modal h3 { margin-bottom: 16px; color: #1a1a2e; }
    .edit-modal input { width: 100%; padding: 10px; border: 1px solid #dde3f0; border-radius: 8px; font-size: 1rem; margin-bottom: 12px; outline: none; }
    .edit-modal input:focus { border-color: #4f6ef7; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
    .btn-cancel { background: #f0f0f0; color: #555; }
    .btn-save { background: #4f6ef7; color: white; }
  </style>
</head>
<body>
<div class="app">
  <div class="calendar">
    <div class="cal-header">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <h2 id="calTitle"></h2>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="side-panel" id="sidePanel">
    <div class="side-inner">
      <h3 id="sideTitle"></h3>
      <div id="sideTodos"></div>
      <div class="side-input-area">
        <input id="sideInput" type="text" placeholder="할 일 입력..." />
        <button class="btn-full" onclick="addTodo()">+ 추가</button>
      </div>
    </div>
  </div>
</div>

<div class="edit-modal-bg" id="editModalBg" onclick="closeEditModal(event)">
  <div class="edit-modal">
    <h3>✏️ 할일 수정</h3>
    <input id="editTitleInput" type="text" placeholder="할 일 제목..." />
    <input id="editDateInput" type="date" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModalDirect()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
  const API = '/todos';
  let todos = [];
  let currentYear, currentMonth, selectedDate = null, editingId;
  const today = new Date();

  async function loadTodos() {
    const res = await fetch(API);
    todos = await res.json();
    renderCalendar();
    if (selectedDate) renderSidePanel();
  }

  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  }

  function renderCalendar() {
    const year = currentYear, month = currentMonth;
    document.getElementById('calTitle').textContent = `${year}년 ${month + 1}월`;
    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    ['일','월','화','수','목','금','토'].forEach(d => {
      const label = document.createElement('div');
      label.className = 'cal-day-label';
      label.textContent = d;
      grid.appendChild(label);
    });

    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-day empty';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = year === today.getFullYear() && month === today.getMonth() && d === today.getDate();
      const isSelected = dateStr === selectedDate;
      const dayTodos = todos.filter(t => t.dueDate === dateStr);

      const cell = document.createElement('div');
      cell.className = `cal-day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}`;

      let inner = `<div class="day-num">${d}</div>`;
      dayTodos.slice(0, 3).forEach(t => {
        inner += `
          <div class="cal-todo-item ${t.completed ? 'done' : ''}">
            <input type="checkbox" ${t.completed ? 'checked' : ''}
              onclick="event.stopPropagation(); toggleComplete(${t.id}, this.checked)" />
            <span class="cal-todo-label">${t.title}</span>
          </div>`;
      });
      if (dayTodos.length > 3) inner += `<div style="font-size:.7rem;color:#aaa;margin-top:2px">+${dayTodos.length - 3}개</div>`;

      cell.innerHTML = inner;
      cell.onclick = () => handleDayClick(dateStr);
      grid.appendChild(cell);
    }
  }

  function handleDayClick(dateStr) {
    if (selectedDate === dateStr) {
      // 같은 날짜 다시 클릭하면 사이드 패널 닫기
      selectedDate = null;
      document.getElementById('sidePanel').classList.remove('open');
      renderCalendar();
    } else {
      selectedDate = dateStr;
      document.getElementById('sidePanel').classList.add('open');
      renderCalendar();
      renderSidePanel();
      setTimeout(() => document.getElementById('sideInput').focus(), 300);
    }
  }

  function renderSidePanel() {
    const dayTodos = todos.filter(t => t.dueDate === selectedDate);
    document.getElementById('sideTitle').textContent = `📅 ${selectedDate}`;
    const container = document.getElementById('sideTodos');
    if (dayTodos.length === 0) {
      container.innerHTML = '<p style="color:#aaa;font-size:.9rem;margin-bottom:8px">할 일이 없어요</p>';
      return;
    }
    container.innerHTML = dayTodos.map(t => `
      <div class="todo-item-side ${t.completed ? 'done' : ''}">
        <input class="side-checkbox" type="checkbox" ${t.completed ? 'checked' : ''}
          onchange="toggleComplete(${t.id}, this.checked)" />
        <span class="side-title">${t.title}</span>
        <button class="btn-sm edit" onclick="openEditModal(${t.id}, '${t.title}', '${t.dueDate || ''}')">수정</button>
        <button class="btn-sm del" onclick="remove(${t.id})">삭제</button>
      </div>
    `).join('');
  }

  async function addTodo() {
    const title = document.getElementById('sideInput').value.trim();
    if (!title) return;
    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, dueDate: selectedDate })
    });
    document.getElementById('sideInput').value = '';
    await loadTodos();
  }

  async function toggleComplete(id, checked) {
    await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completed: String(checked) })
    });
    await loadTodos();
  }

  async function remove(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    await loadTodos();
  }

  function openEditModal(id, title, dueDate) {
    editingId = id;
    document.getElementById('editTitleInput').value = title;
    document.getElementById('editDateInput').value = dueDate;
    document.getElementById('editModalBg').classList.add('show');
  }

  async function saveEdit() {
    const title = document.getElementById('editTitleInput').value.trim();
    const dueDate = document.getElementById('editDateInput').value;
    if (!title) return;
    await fetch(`${API}/${editingId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, dueDate })
    });
    closeEditModalDirect();
    await loadTodos();
  }

  function closeEditModal(e) {
    if (e.target === document.getElementById('editModalBg')) closeEditModalDirect();
  }
  function closeEditModalDirect() {
    document.getElementById('editModalBg').classList.remove('show');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement === document.getElementById('sideInput')) addTodo();
    if (e.key === 'Escape') closeEditModalDirect();
  });

  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  loadTodos();
</script>
</body>
</html>
